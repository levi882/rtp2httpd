name: Release

on:
  release:
    types:
      - published

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Set up Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run web-ui:build

      - name: Save generated pages
        run: cp src/embedded_web_data.h /tmp/embedded_web_data.h

      - name: Check frontend pages are up-to-date
        run: |
          set -euo pipefail
          cp /tmp/embedded_web_data.h src/embedded_web_data.h
          if ! git diff --quiet --exit-code src/embedded_web_data.h; then
            echo "::error::Frontend pages are out of sync with the tag!"
            echo "::error::Please commit the updated embedded_web_data.h and create a new tag."
            exit 1
          fi
          echo "Frontend pages are up-to-date."

  ipk:
    name: Package ${{ matrix.arch }}-${{ matrix.sdk }}
    needs: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk: "24.10.4"
            packages: "rtp2httpd luci-app-rtp2httpd"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          NO_SHFMT_CHECK: true
          PACKAGES: ${{ matrix.packages }}
          V: sc

      - name: Upload to release assets
        run: |
          set -euo pipefail
          ls -la bin/packages/${{ matrix.arch }}/action/
          gh release upload \
            --repo ${{ github.repository }} \
            ${{ github.event.release.tag_name }} \
            bin/packages/${{ matrix.arch }}/action/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
